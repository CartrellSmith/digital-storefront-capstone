<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @theme {
        --color-clifford: #da373d; 
      }
    </style> <!-- add brand colors -->
    <title>Kannon's Home Furniture & Decor</title>
</head>

<body class="bg-[#CAD5E3] text-black/80 font-sans leading-relaxed">

    <header>
        <div class="flex items-center justify-between px-4">
            
            <!-- Logo -->
            <img src="assets/images/Logo_3.png" alt="Kannon's Home Furniture & Decor Logo" class="w-32 hover:scale-105 hover:drop-shadow-xl 
            transition-all duration-300">
        
            <!-- Search Bar -->                
            <input type="text" placeholder="Search" class="w-40 px-2 border rounded">
            
            <!-- Navigation -->
            <ul class="flex gap-4 items-center ml-4 flex-wrap">
                <li><a href="Home.html" class="text-white font-semibold tracking-wide relative
         after:content-[''] after:absolute after:left-0 after:bottom-0 
         after:w-0 after:h-[2px] after:bg-white 
         after:transition-all after:duration-300
         hover:after:w-full">
Home</a></li>
                <li><a href="Product.html" class="text-white font-semibold tracking-wide relative
         after:content-[''] after:absolute after:left-0 after:bottom-0 
         after:w-0 after:h-[2px] after:bg-white 
         after:transition-all after:duration-300
         hover:after:w-full">
Products</a></li>
                <li><a href="About.html" class="text-white font-semibold tracking-wide relative
         after:content-[''] after:absolute after:left-0 after:bottom-0 
         after:w-0 after:h-[2px] after:bg-white 
         after:transition-all after:duration-300
         hover:after:w-full">
About</a></li>
                <li><a href="Contact.html" class="text-white font-semibold tracking-wide relative
         after:content-[''] after:absolute after:left-0 after:bottom-0 
         after:w-0 after:h-[2px] after:bg-white 
         after:transition-all after:duration-300
         hover:after:w-full">
Contact</a></li>
            </ul>
        </div>
    </header>

    <main>
    <section class="bg-[#ADC4DD] py-8 px-4 max-w-3xl mx-auto rounded-lg shadow-md">
        <h1 class="text-4xl mb-6 text-white font-bold tracking-wide uppercase font-serif">Contact Us</h1>
        <p class="mb-6 text-white/90 leading-relaxed font-serif">We'd love to hear from you! Please feel free to reach out to us using the information below:</p>
    </section>

    <form class="bg-[#ADC4DD] py-8 px-4 max-w-3xl mx-auto">
        <fieldset class="bg-white/90 p-4 pt-6 rounded-lg mb-8 shadow-md">
            <legend class="px-4 text-black font-semibold text-center mx-auto bg-white/90 text-center">Contact Information</legend>
            <label for="name" class="block mb-1 text-black font-medium">Name:</label>
            <input type="text" id="name" name="name" class="w-full p-3 rounded-lg bg-white border border-gray-300 
             focus:outline-none focus:ring-2 focus:ring-black/40
             hover:border-black transition-all duration-300">

            <label for="phone" class="block mb-1 text-black font-medium">Phone Number:</label>
            <input type="text" id="phone" name="phone" class="w-full p-3 rounded-lg bg-white border border-gray-300 
             focus:outline-none focus:ring-2 focus:ring-black/40
             hover:border-black transition-all duration-300">

            <label for="email" class="block mb-1 text-black font-medium">Email:</label>
            <input type="email" id="email" name="email" class="w-full p-3 rounded-lg bg-white border border-gray-300 
             focus:outline-none focus:ring-2 focus:ring-black/40
             hover:border-black transition-all duration-300">

            <label for="message" class="block mb-1 text-black font-medium">Message:</label>
            <textarea id="message" name="message" rows="4" class="w-full p-3 rounded-lg bg-white border border-gray-300 
             focus:outline-none focus:ring-2 focus:ring-black/40
             hover:border-black transition-all duration-300"></textarea><br><br>

            <input type="submit" value="Submit" class="bg-white text-black px-6 py-2 rounded-lg shadow-md font-semibold tracking-wide
               hover:bg-black hover:text-white hover:shadow-lg hover:-translate-y-1
               transition-all duration-300 cursor-pointer">
        </fieldset>

        <fieldset class="bg-white/90 p-4 rounded-lg shadow-md text-left">
            <legend class="px-4 text-black font-semibold text-center mx-auto bg-white/90 text-center">Contact Preferences</legend>

            <div class="flex items-center gap-2 mb-2">
                <input type="radio" name="Contact_Preferences" value="call" class="text-black">
                <label>Call</label>
            </div>

            <div class="flex items-center gap-2 mb-2">
                <input type="radio" name="Contact_Preferences" value="text" class="text-black">
                <label>Text</label>
            </div>

            <div class="flex items-center gap-2">
                <input type="radio" name="Contact_Preferences" value="email" class="text-black">
                <label>Email</label>
            </div>            
            
            <input type="submit" value="Submit" class="bg-white text-black px-6 py-2 rounded-lg shadow-md font-semibold tracking-wide
               hover:bg-black hover:text-white hover:shadow-lg hover:-translate-y-1
               transition-all duration-300 cursor-pointer mt-4">

        </fieldset>
    </main>

    </form>

    <footer class="py-6 px-4 max-w-3xl mx-auto">
        <p>&copy; 2026 Kannon's Home Furniture & Decor.</p>
    </footer>

</body>

</html>
