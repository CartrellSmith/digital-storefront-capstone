<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
     <style type="text/tailwindcss">
        @theme {
        --color-clifford: #da373d; 
      }
    </style> <!-- add brand colors -->
    <title>Kannon's Home Funitures & Decor</title>
</head>
<body>

    <header>
        <div class="flex items-center justify-between px-4">
            
            <!-- Logo -->
            <img src="assets/images/Logo.png" alt="Kannon's Home Funitures & Decor Logo" class="w-32">
        
            <!-- Search Bar -->                
            <input type="text" placeholder="Search" class="w-40 px-2 border rounded">
            
            <!-- Navigation -->
            <ul class="flex gap-4 items-center ml-4 flex-wrap">
                <li><a href="Home.html">Home</a></li>
                <li><a href="Product.html">Products</a></li>
                <li><a href="About.html">About</a></li>
                <li><a href="Contact.html">Contact</a></li>
            </ul>
        </div>
    </header>

    <section>
        <h1>Contact Us</h1>
        <p>We'd love to hear from you! Please feel free to reach out to us using the information below:</p>
    </section>

    <form>
        <fieldset>
            <legend>Contact Information</legend>
            <label for="name">Name:</label><br>
            <input type="text" id="name" name="name"><br><br>

            <label for="phone">Phone Number:</label><br>
            <input type="text" id="phone" name="phone"><br><br>

            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email"><br><br>

            <label for="message">Message:</label><br>
            <textarea id="message" name="message" rows="4" cols="50"></textarea><br><br>

            <input type="submit" value="Submit">
        </fieldset>

        <fieldset>
            <legend>Contact Preferences</legend>
            <form>
                <input type="radio" name="Contact_Preferences" value="phone">
                <label for="html">Call</label><br>
                <input type="radio" name="Contact_Preferences" value="phone">
                <label for="css">Text</label><br>
                <input type="radio" name="Contact_Preferences" value="email">
                <label for="javascript">Email</label>
            </form>
        </fieldset>
    </form>

    <footer class="py-6 px-4 max-w-3xl mx-auto">
        <p>&copy; 2026 Kannon's Home Funitures & Decor.</p>
    </footer>

</body>
</html>
